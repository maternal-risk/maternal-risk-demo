<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕产风险智能评估 · 医生端演示</title>
    <!-- Bootstrap CSS 加速样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="assets/assets.png" alt="孕产风险" height="40" style="margin-right: 10px;">
                孕产风险智能评估
            </a>
</a >孕产风险评估系统 (医生端演示)</a >
            <span class="navbar-text text-white">基于40万临床数据</span>
        </div>
    </nav>

    <!-- 主要内容容器 -->
    <div class="container mt-4">
        <!-- 患者总览页面 (默认显示) -->
        <div id="listPage" class="page">
            <!-- 统计卡片 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-info">
                        <div class="card-body">
                            <h5 class="card-title">总管理</h5>
                            <p class="card-text display-6" id="totalCount">0</p >
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-danger">
                        <div class="card-body">
                            <h5 class="card-title">高风险</h5>
                            <p class="card-text display-6" id="highCount">0</p >
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning">
                        <div class="card-body">
                            <h5 class="card-title">中风险</h5>
                            <p class="card-text display-6" id="midCount">0</p >
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="card-title">低风险</h5>
                            <p class="card-text display-6" id="lowCount">0</p >
                        </div>
                    </div>
                </div>
            </div>

            <!-- 患者列表 -->
            <h3>患者列表</h3>
            <div class="row">
                <div class="col-12">
                    <div class="list-group" id="patientList">
                        <!-- 动态生成患者项 -->
                    </div>
                </div>
            </div>
            <p class="text-muted mt-3">点击患者查看详细风险评估报告</p >
        </div>

        <!-- 患者详情页面 (初始隐藏) -->
        <div id="detailPage" class="page" style="display: none;">
            <button class="btn btn-outline-secondary mb-3" id="backToList">← 返回列表</button>
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 id="detailName">患者姓名</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>年龄：</strong> <span id="detailAge"></span>岁</p >
                            <p><strong>孕周：</strong> <span id="detailWeeks"></span>周</p >
                            <p><strong>风险等级：</strong> <span id="detailRiskTag"></span></p >
                            <p><strong>综合风险指数：</strong> <span id="detailScore"></span>/100</p >
                        </div>
                        <div class="col-md-6">
                            <div class="progress mb-3" style="height: 25px;">
                                <div id="detailProgress" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                            </div>
                        </div>
                    </div>
                    <hr>
                    <h5>主要风险因素</h5>
                    <ul id="detailFactors" class="list-group mb-3"></ul>

                    <h5>干预建议</h5>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">复查建议</div>
                                <div class="card-body" id="adviceRecheck"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">生活方式</div>
                                <div class="card-body" id="adviceLifestyle"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">预警信号</div>
                                <div class="card-body" id="adviceWarning"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS 和依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义脚本 -->
    <script src="script.js"></script>
</body>
</html>
